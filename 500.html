{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto text-center py-20">
    <div class="text-8xl font-bold text-gray-300 mb-4">500</div>
    <h1 class="text-3xl font-bold text-gray-800 mb-4">Ошибка сервера</h1>
    <p class="text-gray-500 mb-8">Что-то пошло не так на нашей стороне. Пожалуйста, попробуйте позже.</p>
    <div class="flex gap-4 justify-center">
        <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('index') }}" class="px-6 py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors">
            <i class="fas fa-home mr-2"></i>На главную
        </a>
        <button onclick="location.reload()" class="px-6 py-3 border border-gray-300 rounded-lg font-medium hover:bg-gray-50 transition-colors">
            <i class="fas fa-sync-alt mr-2"></i>Повторить
        </button>
    </div>
    <p class="text-sm text-gray-400 mt-8">
        Если ошибка повторяется, сообщите нам: <a href="mailto:support@subholder.com" class="text-indigo-600 hover:underline">support@subholder.com</a>
    </p>
</div>
{% endblock %}
