{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl border border-gray-200 p-6">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Настройки профиля</h1>
    <form method="POST">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Имя пользователя</label>
            <input type="text" name="username" value="{{ current_user.username }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" value="{{ current_user.email }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Новый пароль</label>
            <input type="password" name="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Подтверждение пароля</label>
            <input type="password" name="confirm_password" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700">Сохранить изменения</button>
    </form>
</div>
{% endblock %}
